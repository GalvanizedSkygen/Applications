<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apply - Galvanized Skygen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'mc-dirt': '#866043',
              'mc-stone': '#7d7d7d',
              'mc-dark-stone': '#373737',
              'mc-light-stone': '#a6a6a6',
              'mc-green': '#3c8527',
              'mc-green-hover': '#4e9e36',
              'mc-green-border': '#1e4712',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mc: ['VT323', 'monospace'],
            }
          }
        }
      }
    </script>
    <style type="text/tailwindcss">
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=VT323&display=swap");

      @layer base {
        body {
          @apply bg-mc-dark-stone text-gray-200 font-sans antialiased;
          background-image: radial-gradient(
            circle at center,
            #4b4b4b 0%,
            #2b2b2b 100%
          );
          background-attachment: fixed;
        }
      }

      @layer components {
        .mc-panel {
          @apply bg-[#c6c6c6] border-4 border-t-white border-l-white border-b-[#555] border-r-[#555] p-6 text-[#333] shadow-xl;
        }

        .mc-panel-dark {
          @apply bg-[#313233] border-4 border-t-[#505051] border-l-[#505051] border-b-[#1e1e1f] border-r-[#1e1e1f] p-6 text-gray-200 shadow-xl;
        }

        .mc-button {
          @apply relative inline-flex items-center justify-center bg-mc-green hover:bg-mc-green-hover text-white px-6 py-3 font-mc text-2xl uppercase tracking-wider border-4 border-t-[#5cba3c] border-l-[#5cba3c] border-b-mc-green-border border-r-mc-green-border active:border-t-mc-green-border active:border-l-mc-green-border active:border-b-[#5cba3c] active:border-r-[#5cba3c] shadow-[4px_4px_0_0_rgba(0,0,0,0.5)] active:shadow-[2px_2px_0_0_rgba(0,0,0,0.5)] active:translate-y-[2px] active:translate-x-[2px] transition-all duration-75;
        }

        .mc-button-secondary {
          @apply relative inline-flex items-center justify-center bg-[#7D7D7D] hover:bg-[#8d8d8d] text-white px-6 py-3 font-mc text-2xl uppercase tracking-wider border-4 border-t-[#a6a6a6] border-l-[#a6a6a6] border-b-[#373737] border-r-[#373737] active:border-t-[#373737] active:border-l-[#373737] active:border-b-[#a6a6a6] active:border-r-[#a6a6a6] shadow-[4px_4px_0_0_rgba(0,0,0,0.5)] active:shadow-[2px_2px_0_0_rgba(0,0,0,0.5)] active:translate-y-[2px] active:translate-x-[2px] transition-all duration-75;
        }

        .mc-button-danger {
          @apply relative inline-flex items-center justify-center bg-[#b83333] hover:bg-[#c93e3e] text-white px-6 py-3 font-mc text-2xl uppercase tracking-wider border-4 border-t-[#e35454] border-l-[#e35454] border-b-[#7a1e1e] border-r-[#7a1e1e] active:border-t-[#7a1e1e] active:border-l-[#7a1e1e] active:border-b-[#e35454] active:border-r-[#e35454] shadow-[4px_4px_0_0_rgba(0,0,0,0.5)] active:shadow-[2px_2px_0_0_rgba(0,0,0,0.5)] active:translate-y-[2px] active:translate-x-[2px] transition-all duration-75;
        }

        .mc-input {
          @apply w-full bg-[#111] border-2 border-[#555] text-white p-3 font-sans focus:outline-none focus:border-mc-green shadow-inner placeholder:text-gray-600 transition-colors;
        }

        .mc-select {
          @apply w-full bg-[#111] border-2 border-[#555] text-white p-3 font-sans focus:outline-none focus:border-mc-green shadow-inner appearance-none transition-colors;
        }

        .mc-title {
          @apply font-mc text-4xl md:text-6xl text-white drop-shadow-[4px_4px_0_rgba(0,0,0,1)];
        }
      }
    </style>
  </head>
  <body class="bg-mc-dark-stone text-gray-200 font-sans antialiased">
    <div
      id="success-view"
      class="min-h-screen flex-col items-center justify-center p-4 hidden"
    >
      <div class="mc-panel-dark max-w-xl w-full text-center space-y-6">
        <svg
          class="w-20 h-20 text-mc-green mx-auto"
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
          <polyline points="22 4 12 14.01 9 11.01" />
        </svg>
        <h2 class="mc-title text-4xl text-mc-green">Application Submitted!</h2>
        <p class="text-xl">
          Thank you for applying for the
          <span id="success-position"></span> position.
        </p>
        <p class="text-gray-400">
          Our staff team will review your application soon.
        </p>
        <div class="pt-6">
          <a href="index.html" class="mc-button">Return Home</a>
        </div>
      </div>
    </div>

    <div
      id="form-view"
      class="min-h-screen py-12 px-4 relative flex justify-center hidden"
    >
      <div class="max-w-3xl w-full z-10 space-y-8">
        <div class="flex items-center space-x-4">
          <a href="index.html" class="mc-button-secondary px-4">
            <svg
              class="w-6 h-6"
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="m12 19-7-7 7-7" />
              <path d="M19 12H5" />
            </svg>
          </a>
          <h1 class="mc-title text-4xl md:text-5xl">
            <span id="position-title"></span> Application
          </h1>
        </div>

        <form id="apply-form" class="mc-panel space-y-8">
          <div
            id="error-message"
            class="bg-red-900/50 border border-red-500 text-red-200 p-4 font-bold hidden"
          ></div>

          <div class="space-y-6">
            <h3 class="font-mc text-2xl border-b-4 border-[#555] pb-2">
              Required Information
            </h3>

            <div class="space-y-2">
              <label class="block font-bold">Discord Username</label>
              <input
                required
                id="discordUsername"
                type="text"
                placeholder="e.g. notch#1234 or notch"
                class="mc-input"
              />
            </div>

            <div class="space-y-2">
              <label class="block font-bold">Discord User ID</label>
              <input
                required
                id="discordUserId"
                type="text"
                placeholder="e.g. 123456789012345678"
                class="mc-input"
              />
              <p class="text-xs text-[#555]">
                Turn on Developer Mode in Discord to copy this.
              </p>
            </div>

            <div class="space-y-2">
              <label class="block font-bold">Gamertag (IGN)</label>
              <input
                required
                id="gamertag"
                type="text"
                placeholder="Your Xbox Live Gamertag"
                class="mc-input"
              />
            </div>
          </div>

          <div class="space-y-6" id="dynamic-questions">
            <h3 class="font-mc text-2xl border-b-4 border-[#555] pb-2">
              Position Questions
            </h3>
            <!-- Injected via JS -->
          </div>

          <button id="submit-btn" type="submit" class="mc-button w-full">
            Submit Application
          </button>
        </form>
      </div>
    </div>
    <script type="module" src="./src/js/apply.js"></script>
    <script src="./src/js/particles.js"></script>
  </body>
</html>
